<body class="template-serene dark-mode">
    <script>
        (function() {
            try { if (localStorage.getItem('darkMode') === '0') { document.body.classList.remove('dark-mode'); } } catch(e) {}
        })();
    </script>

    <div id="main">
        <div class="brand" id="logo">
            <span>🐼 熊猫磁力 · 地址发布</span>
            <span class="flag">最新地址</span>
        </div>

        <div class="refresh-btn-wrap">
            <button class="refresh-btn" id="refreshBtn">
                <span class="btn-text">🔄 获取最新地址</span>
                <span class="spinner" id="spinner" style="display:none;"></span>
            </button>
        </div>
        <div class="status-text" id="statusText">点击按钮获取最新可用地址</div>
        <div id="errorContainer"></div>

        <div id="sectionsContainer"></div>

        <div id="emptyState" class="empty-state" style="display:none;">
            <div style="font-size:2.4rem; margin-bottom:10px;">📡</div>
            <p>暂无地址数据，点击上方按钮获取</p>
        </div>

        <div class="field desc">
            <h4 class="title">📌 使用指南</h4>
            <ul>
                <li>点击地址链接将在新标签页打开</li>
                <li>点击「复制」可快速复制地址</li>
                <li>请收藏本页，便于获取最新地址</li>
                <li>若获取失败，请稍后重试或切换网络</li>
            </ul>
        </div>

        <div class="field foot">
            熊猫磁力 · 地址发布页 © 2026
        </div>
    </div>

    <div class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="切换明暗模式">☀️</div>

    <script>
        (function() {
            const refreshBtn = document.getElementById('refreshBtn');
            const spinner = document.getElementById('spinner');
            const statusText = document.getElementById('statusText');
            const errorContainer = document.getElementById('errorContainer');
            const sectionsContainer = document.getElementById('sectionsContainer');
            const emptyState = document.getElementById('emptyState');

            function setLoading(loading) {
                const btnText = refreshBtn.querySelector('.btn-text');
                if (loading) {
                    btnText.textContent = '⏳ 获取中 ...';
                    spinner.style.display = 'inline-block';
                    refreshBtn.disabled = true;
                } else {
                    btnText.textContent = '🔄 获取最新地址';
                    spinner.style.display = 'none';
                    refreshBtn.disabled = false;
                }
            }

            function showError(msg) {
                errorContainer.innerHTML = `<div class="error-box"><strong>⚠️ </strong> ${msg}</div>`;
            }

            function clearError() {
                errorContainer.innerHTML = '';
            }

            function updateStatus(msg) {
                statusText.textContent = msg;
            }

            window.copyUrl = function(url, btn) {
                const copyText = btn.querySelector('.copy-text') || btn;
                let fullUrl = url;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    fullUrl = 'https://' + url;
                }
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(fullUrl).then(() => {
                        copyText.textContent = '✅ 已复制';
                        setTimeout(() => { copyText.textContent = '复制'; }, 1500);
                    }).catch(() => fallbackCopy(fullUrl, copyText));
                } else {
                    fallbackCopy(fullUrl, copyText);
                }
            };

            function fallbackCopy(url, el) {
                const ta = document.createElement('textarea');
                ta.value = url;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                el.textContent = '✅ 已复制';
                setTimeout(() => { el.textContent = '复制'; }, 1500);
            }

            function createDomainItem(domain, index, categoryName) {
                const wrapper = document.createElement('div');
                wrapper.className = 'enter-maomi';

                const icons = ['icon_chain', 'icon_arrow', 'icon_star', 'icon_globe', 'icon_rocket'];
                const randIcon = icons[Math.floor(Math.random() * icons.length)];
                const pingMs = Math.floor(Math.random() * 180) + 20;

                let fullUrl = domain;
                if (!domain.startsWith('http://') && !domain.startsWith('https://')) {
                    fullUrl = 'https://' + domain;
                }

                const cleanCategory = categoryName ? categoryName.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, '') : '熊猫磁力';

                wrapper.innerHTML = `
                    <div class="enter-icon">
                        <div class="icon ${randIcon}"></div>
                    </div>
                    <div class="enter-ping">
                        <span>${pingMs} ms</span>
                    </div>
                    <div class="enter-link">
                        <a href="${fullUrl}" target="_blank" rel="noopener">
                            <span class="link-title">${cleanCategory} · 地址 ${index + 1}</span>
                            <span class="link-url">${domain}</span>
                        </a>
                    </div>
                    <div class="enter-copy" onclick="copyUrl('${domain}', this)" title="复制链接">
                        <span class="copy-text">复制</span>
                    </div>
                `;
                return wrapper;
            }

            function displayDomains(data) {
                clearError();
                sectionsContainer.innerHTML = '';
                emptyState.style.display = 'none';

                if (data.errno && data.errno !== 0) {
                    showError(data.errmsg || 'API 返回错误');
                    emptyState.style.display = 'block';
                    updateStatus('❌ 获取失败');
                    return;
                }

                let totalCount = 0;
                let hasAnyData = false;

                if (data.domains && Array.isArray(data.domains)) {
                    data.domains.forEach((category, catIndex) => {
                        if (category.domains && Array.isArray(category.domains) && category.domains.length > 0) {
                            hasAnyData = true;
                            const fieldDiv = document.createElement('div');
                            fieldDiv.className = 'field';

                            const title = document.createElement('h4');
                            title.className = 'title';
                            
                            let icon = '🌐';
                            const nameLower = (category.name || '').toLowerCase();
                            if (nameLower.includes('最新')) icon = '🟢';
                            else if (nameLower.includes('备用')) icon = '🟡';
                            
                            const descText = category.desc ? ` · ${category.desc}` : '';
                            title.innerHTML = `${icon} ${category.name || '地址'} <span style="font-weight:400;font-size:0.75rem;opacity:0.5;">${descText}</span>`;
                            fieldDiv.appendChild(title);

                            category.domains.forEach((domain, idx) => {
                                const item = createDomainItem(domain, totalCount + idx, category.name);
                                fieldDiv.appendChild(item);
                            });

                            totalCount += category.domains.length;
                            sectionsContainer.appendChild(fieldDiv);
                            
                            setTimeout(() => {
                                fieldDiv.classList.add('visible');
                            }, 100 + catIndex * 80);
                        }
                    });
                }

                if (!hasAnyData || totalCount === 0) {
                    emptyState.style.display = 'block';
                    updateStatus('未获取到有效地址数据');
                    return;
                }

                updateStatus(`✅ 更新成功 · ${new Date().toLocaleTimeString()} · 共 ${totalCount} 个地址`);
            }

            // ----- API 请求 -----
            const API_ENDPOINTS = ['us.lessapi.com', 'us.lessapi.net', 'us.lessapi.org'];

            function getApiKey() {
                const meta = document.querySelector('meta[name="key"]');
                return meta ? meta.getAttribute('content') : 'gTNuITOx4SOyEjLzgTMt8UQNdkTPlEWtEjd';
            }

            async function fetchFromAPI(url, timeout = 8000) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeout);
                try {
                    const resp = await fetch(url, { 
                        signal: controller.signal, 
                        headers: { 'Accept': 'application/json' } 
                    });
                    clearTimeout(timer);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const json = await resp.json();
                    return json;
                } catch (e) {
                    clearTimeout(timer);
                    throw e;
                }
            }

            async function fetchDomains() {
                setLoading(true);
                clearError();
                let lastError = null;
                const key = getApiKey();

                for (let i = 0; i < API_ENDPOINTS.length; i++) {
                    const endpoint = API_ENDPOINTS[i];
                    try {
                        const url = `https://${endpoint}/pa/domain/current/${key}`;
                        const data = await fetchFromAPI(url);
                        displayDomains(data);
                        setLoading(false);
                        return;
                    } catch (err) {
                        lastError = err;
                        console.warn(`API ${i+1} 失败:`, err.message);
                    }
                }

                const msg = `所有API请求失败，请稍后重试。 最后错误: ${lastError?.message || '未知错误'}`;
                showError(msg);
                updateStatus(`❌ 获取失败 (尝试 ${API_ENDPOINTS.length} 个节点)`);
                setLoading(false);
                sectionsContainer.innerHTML = '';
                emptyState.style.display = 'block';
            }

            refreshBtn.addEventListener('click', fetchDomains);

            updateStatus('⏳ 正在获取最新地址...');
            fetchDomains().catch(() => {});

            setTimeout(() => {
                document.querySelector('.brand')?.classList.add('visible');
            }, 50);

            window.toggleDark = function() {
                const body = document.body;
                const btn = document.getElementById('darkToggle');
                body.classList.toggle('dark-mode');
                const isDark = body.classList.contains('dark-mode');
                btn.textContent = isDark ? '☀️' : '🌙';
                try { localStorage.setItem('darkMode', isDark ? '1' : '0'); } catch(e) {}
            };
            (function() {
                const btn = document.getElementById('darkToggle');
                if (btn) btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            })();

        })();
    </script>
