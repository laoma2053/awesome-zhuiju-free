name: 自动同步上游原仓库
on:
  schedule:
    # UTC 17点=北京时间凌晨1点，每日执行一次同步
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取Fork仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/laoma2053/awesome-zhuiju-free.git

      - name: 拉取并合并上游
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          # 删除合并产生的所有workflows变更，强制恢复本地原有脚本
          git checkout HEAD -- .github/workflows/
          # 把workflows目录的变更从提交里清除
          git reset HEAD .github/workflows/
          git checkout -- .github/workflows/
          git add .

      - name: 推送代码
        run: git push https://${{ github.token }}@github.com/hzxs163/awesome-zhuiju-free.git HEAD:main
