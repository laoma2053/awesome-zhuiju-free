<!DOCTYPE html>

  <style>
    /*只用CSS静态隐藏不需要的大板块，绝不遍历表格DOM破坏表格结构*/

      :has-text("怎么快速选择"),
      :has-text("怎么看评分"),
      :has-text("我们怎么维护"),
      :has-text("如何参与"),
      :has-text("项目原则"),
      :has-text("免责声明"),
      :has-text("Star History")

      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {

  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

</html>
