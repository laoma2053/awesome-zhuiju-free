<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>追剧免费资源汇总</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-nord-dark.css">
  <style>
    /* 修复主题伪元素表头文字泄漏 */
    .content table td::before,
    .content table td::after{
      content: unset !important;
    }
    /* CSS兜底：仅主页屏蔽目标区块，JS失效时视觉也会隐藏 */
    [data-page="README"] section:has(h2){
      display:block;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const hideSectionTitles = [
      "## 加入追剧社群",
      "## 怎么快速选择",
      "## 怎么看评分",
      "## 我们怎么维护",
      "## 如何参与",
      "## 项目原则",
      "## 免责声明",
      "## Star History"
    ];
    window.$docsify = {
      name: '免费追剧资源',
      repo: '',
      loadSidebar: true,
      themeable: { defaultTheme: 'dark' },
      homepage: "README.md",
      plugins: [
        function (hook, vm) {
          hook.beforeEach(function (markdown, next) {
            // 子页面直接放行不做修改
            if (vm.route.file !== 'README.md') {
              next(markdown);
              return;
            }
            hideSectionTitles.forEach(title => {
              // 放宽匹配：兼容标题前任意空白字符，不再强制锁死行开头
              const reg = new RegExp(`[\\s\\S]*?${title}[\\s\\S]*?(?=\\n## |$)`, 'g');
              markdown = markdown.replace(reg, '');
            })
            next(markdown);
          })
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>
</html>
