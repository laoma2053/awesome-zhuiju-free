<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>追剧免费资源汇总</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-nord-dark.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '免费追剧资源',
      repo: '',
      loadSidebar: true,
      themeable: { defaultTheme: 'dark' },
      homepage: "README.md",
      preProcessor(md) {
        // 严格限定仅删除指定8个板块，非贪婪匹配，不会误伤中间正常资源内容
        const dropTitles = [
          "## 加入追剧社群",
          "## 怎么快速选择",
          "## 怎么看评分",
          "## 我们怎么维护",
          "## 如何参与",
          "## 项目原则",
          "## 免责声明",
          "## Star History"
        ];
        dropTitles.forEach(title=>{
          // 限定匹配范围：当前标题内容，截止到同级二级标题/文档末尾，不跨区块误删
          const reg = new RegExp(`^${title}\\n[\\s\\S]*?(?=^## |$)`, 'gm');
          md = md.replace(reg, '');
        })
        return md;
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>
</html>
