<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>追剧免费资源汇总</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-nord-dark.css">
  <style>
    /* 修复表格伪元素多出文字 */
    .content table td::before,.content table td::after{content: unset !important;}
    /* 右上角GitHub按钮 */
    .github-top-link{
      position: fixed;
      top:14px;
      right:22px;
      z-index: 999;
      color:#88c0d0;
      text-decoration: none;
      font-size: 14px;
    }
    .github-top-link:hover{
      color:#81a1c1;
      text-decoration: underline;
    }
    /* 仅主页隐藏顶部横幅：用class匹配兜底，不用高兼容风险伪类 */
    [data-page="README"] .content h1,
    [data-page="README"] .content p:first-of-type,
    [data-page="README"] .content .badges,
    [data-page="README"] .content > a[href*="浏览精选资源"]{
      display:none;
    }
    /* 屏蔽指定8个板块 */
    [data-page="README"] h2:nth-child(-n+5){display:none;}
  </style>
</head>
<body>
  <a class="github-top-link" target="_blank" href="https://github.com/hzxs163/awesome-zhuiju-free">打开GitHub项目</a>
  <div id="app"></div>
  <script>
    const hideSectionTitles = [
      "## 加入追剧社群","## 怎么快速选择","## 怎么看评分",
      "## 我们怎么维护","## 如何参与","## 项目原则","## 免责声明","## Star History"
    ];
    window.$docsify = {
      name: '免费追剧资源',
      repo: '',
      loadSidebar: true,
      themeable: { defaultTheme: 'dark' },
      homepage: "README.md",
      plugins: [
          function (hook, vm) {
            hook.beforeEach(function (markdown, next) {
              if (vm.route.file !== 'README.md') { next(markdown); return; }
              hideSectionTitles.forEach(title => {
                const reg = new RegExp(`${title}\\n[\\s\\S]*?(?=\\n## |$)`, 'g');
                markdown = markdown.replace(reg, '');
              })
              next(markdown);
            })
          }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>
</html>
